# Game server (Socket.IO). Pair with Vercel/GitHub Pages for the UI,
# or open this service URL directly (it can also serve dist/ if built).
services:
  - type: web
    name: sinyal
    runtime: node
    plan: free
    # NODE_ENV=production skips devDependencies; Vite/tsc need them at build time.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # Comma-separated browser origins allowed to connect via Socket.IO / CORS.
      - key: CLIENT_ORIGIN
        value: https://sinyal-kappa.vercel.app,https://r00twr3nch.github.io,https://yunusemredurak.com.tr,http://yunusemredurak.com.tr,http://localhost:5173