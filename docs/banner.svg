<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Sinyal">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#121a33"/>
      <stop offset="100%" stop-color="#1a1230"/>
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#6c8cff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6c8cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="88%" cy="15%" r="40%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f4f7ff"/>
      <stop offset="100%" stop-color="#c9d4ff"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c8cff"/>
      <stop offset="100%" stop-color="#8b6cff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="28" fill="url(#glowA)"/>
  <rect width="1200" height="420" rx="28" fill="url(#glowB)"/>

  <!-- subtle grid -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="1">
    <path d="M0 105 H1200 M0 210 H1200 M0 315 H1200"/>
    <path d="M200 0 V420 M400 0 V420 M600 0 V420 M800 0 V420 M1000 0 V420"/>
  </g>

  <!-- signal rings -->
  <g transform="translate(980 210)" fill="none" stroke="#6c8cff" stroke-linecap="round">
    <circle r="34" stroke-width="10" opacity="0.95"/>
    <circle r="68" stroke-width="8" opacity="0.45"/>
    <circle r="104" stroke-width="6" opacity="0.25"/>
    <circle r="140" stroke-width="4" opacity="0.12"/>
  </g>
  <circle cx="980" cy="210" r="14" fill="#ff6b9d" filter="url(#soft)"/>

  <!-- left content -->
  <g transform="translate(72 92)">
    <rect x="0" y="0" width="118" height="36" rx="18" fill="url(#pill)" opacity="0.95"/>
    <text x="59" y="24" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="1.5">PARTY GAME</text>

    <text x="0" y="110" font-family="Segoe UI, system-ui, sans-serif" font-size="86" font-weight="800" fill="url(#title)" letter-spacing="-2">Sinyal</text>
    <text x="0" y="162" font-family="Segoe UI, system-ui, sans-serif" font-size="26" font-weight="500" fill="#9aa6c3">
      Gizli görev. Doğal sohbet. Kim sinyal veriyor?
    </text>

    <g transform="translate(0 210)" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600" fill="#c9d4ff">
      <rect x="0" y="-22" width="150" height="40" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
      <text x="75" y="4" text-anchor="middle">3–12 oyuncu</text>

      <rect x="164" y="-22" width="150" height="40" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
      <text x="239" y="4" text-anchor="middle">Gerçek zamanlı</text>

      <rect x="328" y="-22" width="150" height="40" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
      <text x="403" y="4" text-anchor="middle">Mobil öncelikli</text>
    </g>
  </g>
</svg>
